name: Backend tests

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  pytest:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: raaktest
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        env:
          TEST_DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/raaktest
          SECRET_KEY: ci-test-secret-key-long-enough-for-hs256
          APP_ENV: dev
        run: python -m pytest -v --tb=short
