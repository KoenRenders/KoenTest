name: CI

on:
  push:
    branches: ["master", "feature/**"]
  pull_request:
    branches: ["master"]

jobs:
  pytest:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: raaktest
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      # Static type-check vangt None-dereferences en verkeerde argument-types vóór
      # de deploy — voorheen sneuvelden die pas op runtime (PROD). Symmetrie met
      # de frontend-job die `tsc --noEmit` draait.
      - name: Typecheck (mypy)
        run: python -m mypy

      - name: Run pytest (met coverage-rapport)
        env:
          TEST_DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/raaktest
          SECRET_KEY: ci-test-secret-key-long-enough-for-hs256
          APP_ENV: dev
        # Coverage wordt enkel gerapporteerd (geen faaldrempel; #127). Een drempel
        # kan later stapsgewijs via --cov-fail-under.
        run: python -m pytest -v --tb=short --cov=app --cov-report=term-missing --cov-fail-under=73

  audit:
    runs-on: ubuntu-latest
    # pip-audit blijft rapporterend tot er een ignore-lijst-mechanisme staat
    # (architectuurdoc §19.1) — dan blokkerend. npm audit verdween met de
    # frontend-container (React-exit #405): er is geen Node meer in de stack.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: pip-audit (backend)
        continue-on-error: true
        working-directory: backend
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

  e2e:
    runs-on: ubuntu-latest
    # BLOKKEREND sinds #395: de e2e-geldflow is de laatste verdediging vóór een
    # deploy; een rode e2e = geen merge.

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: raake2e
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/raake2e
      SECRET_KEY: ci-e2e-secret-key-long-enough-for-hs256
      APP_ENV: dev
      E2E_BASE_URL: http://localhost:8000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # playwright-python vervangt de Node-Playwright (React-exit #405): de
      # golden flows draaien in een echte Chromium tegen de server-rendered site.
      - name: Backend-deps + Playwright-browser
        working-directory: backend
        run: |
          pip install -r requirements.txt playwright pytest
          playwright install --with-deps chromium

      - name: Migraties + seed postcodes
        working-directory: backend
        run: |
          alembic upgrade head
          python seed_postal_codes.py

      - name: Start backend
        working-directory: backend
        run: nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 > /tmp/backend.log 2>&1 &

      - name: Wachten tot de backend bereikbaar is
        run: |
          for i in $(seq 1 60); do
            curl -sf http://localhost:8000/api/health && exit 0
            sleep 2
          done
          echo "Backend niet bereikbaar"; tail -50 /tmp/backend.log; exit 1

      - name: Run e2e (golden flows)
        working-directory: backend
        run: python -m pytest -v tests_e2e

      - name: Backend-log bij falen
        if: failure()
        run: tail -100 /tmp/backend.log
