name: uat

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: raakmillegem_uat
      POSTGRES_USER: ${DB_USER:?DB_USER ontbreekt in .env.uat}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD ontbreekt in .env.uat}
    volumes:
      - postgres_uat_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      args:
        APP_VERSION: ${APP_VERSION:-onbekend}
        GIT_SHA: ${GIT_SHA:-onbekend}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER:?DB_USER ontbreekt in .env.uat}:${DB_PASSWORD:?DB_PASSWORD ontbreekt in .env.uat}@db:5432/raakmillegem_uat
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY ontbreekt in .env.uat}
      DEBUG: ${DEBUG:-false}
      GMAIL_USER: ${GMAIL_USER:-}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
      GMAIL_FROM: ${GMAIL_FROM:-}
      MOLLIE_API_KEY: ${MOLLIE_API_KEY:-}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL ontbreekt in .env.uat}
      PUBLIC_URL: ${PUBLIC_URL:?PUBLIC_URL ontbreekt in .env.uat}
      APP_ENV: uat
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MEMBERSHIP_RENEWAL_START_MD: ${MEMBERSHIP_RENEWAL_START_MD:-}
      PAYMENT_IBAN: ${PAYMENT_IBAN:-}
      PAYMENT_BENEFICIARY: ${PAYMENT_BENEFICIARY:-}
      PAYMENT_TERM_DAYS: ${PAYMENT_TERM_DAYS:-7}
    depends_on:
      db:
        condition: service_healthy
    networks:
      internal:
      proxy:
        aliases:
          - uat-backend

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_APP_ENV: uat
        NEXT_PUBLIC_ENV_COLOR: ${ENV_COLOR:-#B45309}
        # Umami web-analytics (#152/#176, laag 1). Leeg = tracker laadt niet (no-op).
        NEXT_PUBLIC_UMAMI_SRC: ${NEXT_PUBLIC_UMAMI_SRC:-}
        NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${NEXT_PUBLIC_UMAMI_WEBSITE_ID:-}
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      internal:
      proxy:
        aliases:
          - uat-frontend

  # Umami (#176) — via subdomein door de gedeelde Caddy (alias uat-umami), eigen DB.
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: unless-stopped
    environment:
      DATABASE_URL: ${UMAMI_DATABASE_URL:-postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/umami_uat}
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET:?UMAMI_APP_SECRET ontbreekt in .env.uat}
    depends_on:
      db:
        condition: service_healthy
    networks:
      internal:
      proxy:
        aliases:
          - uat-umami

volumes:
  postgres_uat_data:

networks:
  internal:
  proxy:
    external: true
    name: raak_proxy
