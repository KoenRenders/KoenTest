{% import "_macros.html" as ui %}
<div class="flex gap-1 mb-3 text-sm">
  {% for code, label in [("upcoming", _("Komende")), ("archived", _("Archief")), ("all", _("Alles"))] %}
  <button class="px-3 py-1 rounded-lg border {% if scope == code %}bg-blue-600 text-white border-blue-600{% else %}bg-white border-gray-200 hover:bg-gray-50{% endif %}"
          hx-get="/admin/activiteiten/lijst?scope={{ code }}" hx-target="#aa-lijst" hx-swap="innerHTML">{{ label }}</button>
  {% endfor %}
</div>
<div class="space-y-2">
  {% for a in activities %}
  <button class="w-full text-left px-3 py-2 rounded-lg text-sm border bg-white border-gray-200 hover:bg-gray-50"
          hx-get="/admin/activiteiten/{{ a.id }}" hx-target="#aa-detail" hx-swap="innerHTML">
    <div class="font-medium">{{ a.name }}
      {% if a.is_cancelled %}{{ ui.badge(_("geannuleerd"), "red") }}{% endif %}</div>
    <div class="text-xs text-gray-500">{{ a.sort_date.strftime("%d-%m-%Y") if a.sort_date else "—" }}{% if a.registration_count is not none %} · {{ a.registration_count }} inschrijvingen{% endif %}</div>
  </button>
  {% else %}
  {{ ui.empty_state(_("Nog geen activiteiten.")) }}
  {% endfor %}
</div>
