{% extends "admin_base.html" %}
{% block title %}{{ _("Leden — Raak") }}{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold text-blue-800 mb-4">{{ _("Leden") }}</h1>
<div class="flex flex-col md:flex-row gap-6">
  <div class="md:w-72 shrink-0">
    <input type="search" name="q" value="{{ q }}" placeholder="{{ _('Zoek op naam of e-mail…') }}"
           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm mb-3"
           hx-get="/admin/leden/lijst" hx-target="#leden-lijst" hx-swap="innerHTML"
           hx-trigger="input changed delay:300ms, search">
    <div id="leden-lijst">
      {% include "_leden_lijst.html" %}
    </div>
  </div>
  <div class="flex-1 min-w-0">
    <div id="leden-detail"></div>
  </div>
</div>
{% endblock %}
