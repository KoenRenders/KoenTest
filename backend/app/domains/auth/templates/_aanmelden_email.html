{% import "_macros.html" as ui %}
{{ ui.error_banner(error) }}
<form hx-post="/aanmelden" hx-target="#aanmelden-stap" hx-swap="innerHTML" class="space-y-4">
  <div>
    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">{{ _("E-mailadres") }}</label>
    <input type="email" name="email" id="email" required value="{{ email|default('') }}"
           class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
  </div>
  {{ ui.btn_primary(_('Stuur inloginfo')) }}
</form>
