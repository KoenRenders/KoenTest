{% import "_macros.html" as ui %}
{% if error %}{{ ui.error_banner(error) }}{% else %}
<div class="mb-4 bg-blue-50 border border-blue-200 rounded-lg p-4 text-blue-700" role="status">{{ _("Als dit e-mailadres gekend is, ontvang je een e-mail met een code.") }}</div>
{% endif %}
<form hx-post="/aanmelden/code" hx-target="#aanmelden-stap" hx-swap="innerHTML" class="space-y-4">
  <input type="hidden" name="email" value="{{ email }}">
  <div>
    <label for="code" class="block text-sm font-medium text-gray-700 mb-1">{{ _("Code uit de e-mail") }}</label>
    <input type="text" name="code" id="code" inputmode="numeric" autocomplete="one-time-code" required
           class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
  </div>
  {{ ui.btn_primary(_('Aanmelden')) }}
</form>
