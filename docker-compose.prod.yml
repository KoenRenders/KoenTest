name: prod

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: raakmillegem
      POSTGRES_USER: ${DB_USER:?DB_USER ontbreekt in .env.prod}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD ontbreekt in .env.prod}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      args:
        APP_VERSION: ${APP_VERSION:-onbekend}
        GIT_SHA: ${GIT_SHA:-onbekend}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER:?DB_USER ontbreekt in .env.prod}:${DB_PASSWORD:?DB_PASSWORD ontbreekt in .env.prod}@db:5432/raakmillegem
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY ontbreekt in .env.prod}
      DEBUG: ${DEBUG:-false}
      GMAIL_USER: ${GMAIL_USER:-}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
      GMAIL_FROM: ${GMAIL_FROM:-}
      MOLLIE_API_KEY: ${MOLLIE_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      # STT/Voxtral (#282) — backend leest dit als runtime-env; default browser_only
      # houdt de WS-route dark. Zet STT_MODE=native_first in .env.prod om Voxtral te activeren.
      STT_MODE: ${STT_MODE:-browser_only}
      STT_PROVIDER: ${STT_PROVIDER:-voxtral}
      STT_MODEL: ${STT_MODEL:-voxtral-mini-transcribe-realtime-2602}
      STT_BASE_URL: ${STT_BASE_URL:-wss://api.mistral.ai}
      STT_SAMPLE_RATE: ${STT_SAMPLE_RATE:-16000}
      STT_LANGUAGE: ${STT_LANGUAGE:-nl}
      CHAT_LLM_PROVIDER: ${CHAT_LLM_PROVIDER:-auto}
      CHAT_ENABLED: ${CHAT_ENABLED:-false}
      CHAT_MAX_INPUT_CHARS: ${CHAT_MAX_INPUT_CHARS:-2000}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL ontbreekt in .env.prod}
      PUBLIC_URL: ${PUBLIC_URL:?PUBLIC_URL ontbreekt in .env.prod}
      APP_ENV: prod
      LOG_LEVEL: ${LOG_LEVEL:-WARNING}
      MEMBERSHIP_RENEWAL_START_MD: ${MEMBERSHIP_RENEWAL_START_MD:-}
      PAYMENT_IBAN: ${PAYMENT_IBAN:-}
      PAYMENT_BENEFICIARY: ${PAYMENT_BENEFICIARY:-}
      PAYMENT_TERM_DAYS: ${PAYMENT_TERM_DAYS:-7}
    depends_on:
      db:
        condition: service_healthy
    networks:
      internal:
      proxy:
        aliases:
          - prod-backend

  frontend:
    build:
      context: ./frontend
      args:
        # PROD heeft bewust geen omgevingsindicator (lege kleur → geen balk/prefix).
        NEXT_PUBLIC_APP_ENV: prod
        NEXT_PUBLIC_CHATBOT_ENABLED: ${CHAT_ENABLED:-false}
        NEXT_PUBLIC_STT_MODE: ${STT_MODE:-browser_only}
        NEXT_PUBLIC_ENV_COLOR: ${ENV_COLOR:-}
        # Umami web-analytics (#152/#176, laag 1). Leeg = tracker laadt niet (no-op).
        NEXT_PUBLIC_UMAMI_SRC: ${NEXT_PUBLIC_UMAMI_SRC:-}
        NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${NEXT_PUBLIC_UMAMI_WEBSITE_ID:-}
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      internal:
      proxy:
        aliases:
          - prod-frontend

  # Umami (#176) — via subdomein door de gedeelde Caddy (alias prod-umami), eigen DB.
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: unless-stopped
    environment:
      DATABASE_URL: ${UMAMI_DATABASE_URL:-postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/umami_prod}
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET:?UMAMI_APP_SECRET ontbreekt in .env.prod}
    depends_on:
      db:
        condition: service_healthy
    networks:
      internal:
      proxy:
        aliases:
          - prod-umami

  db-backup:
    image: postgres:16
    restart: unless-stopped
    environment:
      PGPASSWORD: ${DB_PASSWORD:?DB_PASSWORD ontbreekt in .env.prod}
      DB_USER: ${DB_USER:?DB_USER ontbreekt in .env.prod}
      DB_NAME: raakmillegem
      BACKUP_PREFIX: prod
      KEEP_DAYS: 7
      BACKUP_HOUR: "02"
    volumes:
      - ./backups:/backups
      - ./scripts/db-backup.sh:/db-backup.sh:ro
    entrypoint: ["bash", "/db-backup.sh"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  # Aparte dagelijkse back-up van de Umami-analytics-DB (#176).
  umami-db-backup:
    image: postgres:16
    restart: unless-stopped
    environment:
      PGPASSWORD: ${DB_PASSWORD:?DB_PASSWORD ontbreekt in .env.prod}
      DB_USER: ${DB_USER:?DB_USER ontbreekt in .env.prod}
      DB_NAME: umami_prod
      BACKUP_PREFIX: prod-umami
      KEEP_DAYS: 7
      BACKUP_HOUR: "03"
    volumes:
      - ./backups:/backups
      - ./scripts/db-backup.sh:/db-backup.sh:ro
    entrypoint: ["bash", "/db-backup.sh"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

volumes:
  postgres_prod_data:

networks:
  internal:
  proxy:
    external: true
    name: raak_proxy
