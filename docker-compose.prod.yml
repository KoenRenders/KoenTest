services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: raakmillegem
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/raakmillegem
      SECRET_KEY: ${SECRET_KEY:-change-me}
      DEBUG: ${DEBUG:-false}
      GMAIL_USER: ${GMAIL_USER:-}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
      GMAIL_FROM: ${GMAIL_FROM:-}
      MOLLIE_API_KEY: ${MOLLIE_API_KEY:-}
      FRONTEND_URL: ${FRONTEND_URL:-https://prod.raakmillegem.be}
      PUBLIC_URL: ${PUBLIC_URL:-https://prod.raakmillegem.be}
      APP_ENV: prod
    depends_on:
      db:
        condition: service_healthy
    networks:
      internal:
      proxy:
        aliases:
          - prod-backend

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      internal:
      proxy:
        aliases:
          - prod-frontend

volumes:
  postgres_prod_data:

networks:
  internal:
  proxy:
    external: true
    name: raak_proxy
