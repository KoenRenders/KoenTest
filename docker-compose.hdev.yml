name: hdev

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: raakmillegem_hdev
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_hdev_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      args:
        APP_VERSION: ${APP_VERSION:-onbekend}
        GIT_SHA: ${GIT_SHA:-onbekend}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/raakmillegem_hdev
      SECRET_KEY: ${SECRET_KEY:-change-me}
      DEBUG: ${DEBUG:-false}
      GMAIL_USER: ${GMAIL_USER:-}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
      GMAIL_FROM: ${GMAIL_FROM:-}
      MOLLIE_API_KEY: ${MOLLIE_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      # STT/Voxtral (#282) — backend leest dit als runtime-env; default browser_only
      # houdt de WS-route dark. Zet STT_MODE=native_first in .env.hdev om Voxtral te activeren.
      STT_MODE: ${STT_MODE:-browser_only}
      STT_PROVIDER: ${STT_PROVIDER:-voxtral}
      STT_MODEL: ${STT_MODEL:-voxtral-mini-transcribe-realtime-2602}
      STT_BASE_URL: ${STT_BASE_URL:-wss://api.mistral.ai}
      STT_SAMPLE_RATE: ${STT_SAMPLE_RATE:-16000}
      CHAT_LLM_PROVIDER: ${CHAT_LLM_PROVIDER:-auto}
      CHAT_ENABLED: ${CHAT_ENABLED:-false}
      CHAT_MAX_INPUT_CHARS: ${CHAT_MAX_INPUT_CHARS:-2000}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL ontbreekt in .env.hdev}
      PUBLIC_URL: ${PUBLIC_URL:?PUBLIC_URL ontbreekt in .env.hdev}
      APP_ENV: hdev
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MEMBERSHIP_RENEWAL_START_MD: ${MEMBERSHIP_RENEWAL_START_MD:-}
      PAYMENT_IBAN: ${PAYMENT_IBAN:-}
      PAYMENT_BENEFICIARY: ${PAYMENT_BENEFICIARY:-}
      PAYMENT_TERM_DAYS: ${PAYMENT_TERM_DAYS:-7}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_APP_ENV: hdev
        NEXT_PUBLIC_CHATBOT_ENABLED: ${CHAT_ENABLED:-false}
        NEXT_PUBLIC_STT_MODE: ${STT_MODE:-browser_only}
        NEXT_PUBLIC_ENV_COLOR: ${ENV_COLOR:-#15803D}
        # Umami web-analytics (#152, laag 1). Leeg = tracker laadt niet (no-op).
        # Vul NEXT_PUBLIC_UMAMI_WEBSITE_ID pas in nadat je in Umami een website hebt
        # aangemaakt; src wijst via de hdev-Caddy naar /umami/script.js.
        NEXT_PUBLIC_UMAMI_SRC: ${NEXT_PUBLIC_UMAMI_SRC:-}
        NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${NEXT_PUBLIC_UMAMI_WEBSITE_ID:-}
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - internal

  # Zelf-gehoste, cookieloze web-analytics (#152, laag 1). Hergebruikt de
  # bestaande Postgres via een EIGEN database (umami_hdev) — geen tweede DB-engine,
  # en zo automatisch meegenomen in db-backup. Eenmalig provisionen: zie docs/umami.md
  # (CREATE DATABASE umami_hdev). Umami draait Prisma-migraties zelf bij startup.
  # Bereikbaar op een EIGEN poort (8082, root): het prebuilt image past runtime-
  # BASE_PATH niet toe, dus geen subpad via de Caddy.
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: unless-stopped
    environment:
      DATABASE_URL: ${UMAMI_DATABASE_URL:-postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/umami_hdev}
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET:?UMAMI_APP_SECRET ontbreekt in .env.hdev}
    ports:
      # Eigen poort, root-served. Het prebuilt image negeert runtime-BASE_PATH,
      # dus geen subpad via de Caddy (#172 vervangen door #174).
      - "8082:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "8081:8081"
    volumes:
      - ./caddy/Caddyfile.hdev:/etc/caddy/Caddyfile:z
      - caddy_hdev_data:/data
      - caddy_hdev_config:/config
    depends_on:
      - frontend
      - backend
    networks:
      - internal

volumes:
  postgres_hdev_data:
  caddy_hdev_data:
  caddy_hdev_config:

networks:
  internal:
