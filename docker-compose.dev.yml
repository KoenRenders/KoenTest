name: dev

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: raakmillegem
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - internal
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      args:
        APP_VERSION: ${APP_VERSION:-onbekend}
        GIT_SHA: ${GIT_SHA:-onbekend}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/raakmillegem
      SECRET_KEY: ${SECRET_KEY:-change-me}
      GMAIL_USER: ${GMAIL_USER:-}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
      GMAIL_FROM: ${GMAIL_FROM:-}
      MOLLIE_API_KEY: ${MOLLIE_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      CHAT_LLM_PROVIDER: ${CHAT_LLM_PROVIDER:-auto}
      CHAT_ENABLED: ${CHAT_ENABLED:-false}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost}
      APP_ENV: dev
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PAYMENT_IBAN: ${PAYMENT_IBAN:-}
      PAYMENT_BENEFICIARY: ${PAYMENT_BENEFICIARY:-}
      PAYMENT_TERM_DAYS: ${PAYMENT_TERM_DAYS:-7}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_APP_ENV: dev
        NEXT_PUBLIC_CHATBOT_ENABLED: ${CHAT_ENABLED:-false}
        NEXT_PUBLIC_ENV_COLOR: ${ENV_COLOR:-#7C3AED}
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - internal

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./caddy/Caddyfile.dev:/etc/caddy/Caddyfile:z
      - caddy_dev_data:/data
      - caddy_dev_config:/config
    depends_on:
      - frontend
      - backend
    networks:
      - internal

volumes:
  postgres_dev_data:
  caddy_dev_data:
  caddy_dev_config:

networks:
  internal:
